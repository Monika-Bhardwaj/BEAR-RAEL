spec_version: 1
name: bear-rael
version: "1.0.0"
type: space
runtime: fastapi
app: server.app:app
port: 7860

description: >
  Bayesian Embodied Autonomous Robotics Lab — a Sim2Real robotics debugging
  environment focused on active probing and reasoning under physical uncertainty.

author: Monika Bhardwaj / BEAR-RAEL
tags:
  - robotics
  - active-learning
  - bayesian-inference
  - sim2real
  - openenv

tasks:
  - id: easy
    name: single_variable_diagnosis
    difficulty: easy
    max_steps: 18
  - id: medium
    name: dual_variable_interaction
    difficulty: medium
    max_steps: 20
  - id: hard
    name: full_debugging_noisy
    difficulty: hard
    max_steps: 22

endpoints:
  reset:  {method: POST, path: /reset}
  step:   {method: POST, path: /step}
  state:  {method: GET,  path: /state}
  health: {method: GET,  path: /health}
  grade:  {method: POST, path: /grade}
